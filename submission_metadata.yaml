ai_usage_summary: |
  Used Cursor/Claude for architecture discussion, code review, and implementation
  scaffolding. All scoring logic was reviewed and tested locally. Candidate data
  was not sent to external APIs during ranking (CPU-only local embeddings).

methodology_summary: |
  Layered ranker: (1) title_relevance as primary anti-keyword-stuffing gate,
  (2) production_ml_experience from career_history text not skill tags,
  (3) low-weight semantic similarity via precomputed MiniLM embeddings,
  (4) experience/location/notice logistics, (5) multiplicative penalties for
  consulting-only careers, JD disqualifiers, and structural honeypots,
  (6) narrow-band behavioral engagement modifier. Precompute embeddings offline;
  ranking loads .npy artifacts only (~164s for 100K, ~2.2GB RAM, CPU, no network).

declarations:
